<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Черешма</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; font-family: 'Courier New', Courier, monospace; background: #000; }
        #matrix-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: #000; }
        .container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; position: relative; z-index: 1; }
        .screen { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .screen::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.35); z-index: 0; }
        .content { position: relative; z-index: 1; text-align: center; padding: 20px; max-width: 90%; }
        .avatar { width: 160px; height: 160px; border-radius: 50%; border: 3px solid #a855f7; box-shadow: 0 0 25px #a855f7, 0 0 50px rgba(168,85,247,0.4); overflow: hidden; margin: 0 auto 25px; background: #000; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        h1, h2, p { color: #c084fc; text-shadow: 0 0 10px #c084fc, 0 0 25px rgba(192,132,252,0.6); letter-spacing: 2px; }
        h1 { font-size: 2.2rem; margin-bottom: 30px; }
        h2 { font-size: 2rem; margin-bottom: 20px; }
        p { font-size: 1.5rem; margin-bottom: 20px; }
        .cursor { display: inline-block; width: 10px; height: 20px; background: #c084fc; margin-left: 5px; animation: blink 1s step-end infinite; vertical-align: middle; box-shadow: 0 0 10px #c084fc; }
        @keyframes blink { 50% { opacity: 0; } }
        .tg-btn { display: inline-flex; align-items: center; gap: 10px; padding: 14px 28px; background: rgba(168,85,247,0.15); border: 2px solid #a855f7; border-radius: 50px; color: #c084fc; font-size: 1.1rem; text-decoration: none; font-family: 'Courier New', Courier, monospace; box-shadow: 0 0 15px rgba(168,85,247,0.3); transition: all 0.3s ease; margin-top: 10px; }
        .tg-btn:hover { background: rgba(168,85,247,0.3); box-shadow: 0 0 25px rgba(168,85,247,0.6); transform: scale(1.05); }
        .tg-btn svg { width: 24px; height: 24px; fill: #c084fc; filter: drop-shadow(0 0 5px #c084fc); }
        .scroll-hint { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 2; animation: bounce 2s infinite; }
        .scroll-hint svg { width: 30px; height: 30px; fill: #a855f7; filter: drop-shadow(0 0 8px #a855f7); }
        @keyframes bounce { 0%,20%,50%,80%,100%{transform:translateX(-50%) translateY(0);} 40%{transform:translateX(-50%) translateY(-12px);} 60%{transform:translateX(-50%) translateY(-6px);} }
        .dots { position: fixed; right: 15px; top: 50%; transform: translateY(-50%); z-index: 10; display: flex; flex-direction: column; gap: 12px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(168,85,247,0.3); border: 2px solid #a855f7; transition: all 0.3s; cursor: pointer; }
        .dot.active { background: #a855f7; box-shadow: 0 0 10px #a855f7; }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    <div class="dots">
        <div class="dot active" onclick="goTo(0)"></div>
        <div class="dot" onclick="goTo(1)"></div>
        <div class="dot" onclick="goTo(2)"></div>
        <div class="dot" onclick="goTo(3)"></div>
    </div>
    <div class="container" id="container">
        <section class="screen">
            <div class="content">
                <div class="avatar"><img src="avatar.png" alt="Аватарка"></div>
                <h1>привет Я черешма!<span class="cursor"></span></h1>
                <a href="https://t.me/cheremshaprojects" target="_blank" class="tg-btn">
                    <svg viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.161c-.18 1.897-.96 6.502-1.356 8.627-.168.9-.5 1.201-.82 1.23-.697.064-1.226-.461-1.901-.903-1.056-.692-1.653-1.122-2.678-1.799-1.185-.78-.417-1.21.258-1.911.177-.182 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.139-5.062 3.345-.479.329-.913.489-1.302.48-.428-.009-1.252-.242-1.865-.442-.751-.244-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.831-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.477-1.635.099-.002.321.023.465.141.121.099.155.232.171.325.015.093.034.305.019.471z"/></svg>
                    Telegram
                </a>
            </div>
            <div class="scroll-hint"><svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg></div>
        </section>
        <section class="screen">
            <div class="content">
                <div class="avatar"><img src="avatar.png" alt="Аватарка"></div>
                <h2>я просто вайбкодер :)</h2>
            </div>
            <div class="scroll-hint"><svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg></div>
        </section>
        <section class="screen">
            <div class="content">
                <h2>мои проекты:</h2>
                <p>пока нету :)</p>
            </div>
            <div class="scroll-hint"><svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg></div>
        </section>
        <section class="screen">
            <div class="content">
                <h2>связи со мной:</h2>
                <a href="https://t.me/CheremshaprojectsDev" target="_blank" class="tg-btn">
                    <svg viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.161c-.18 1.897-.96 6.502-1.356 8.627-.168.9-.5 1.201-.82 1.23-.697.064-1.226-.461-1.901-.903-1.056-.692-1.653-1.122-2.678-1.799-1.185-.78-.417-1.21.258-1.911.177-.182 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.139-5.062 3.345-.479.329-.913.489-1.302.48-.428-.009-1.252-.242-1.865-.442-.751-.244-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.831-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.477-1.635.099-.002.321.023.465.141.121.099.155.232.171.325.015.093.034.305.019.471z"/></svg>
                    Telegram
                </a>
            </div>
        </section>
    </div>
    <script>
        const c = document.getElementById('matrix-canvas'), x = c.getContext('2d');
        let w, h;
        function resize(){ w=c.width=innerWidth; h=c.height=innerHeight; }
        resize();
        window.addEventListener('resize', resize);
        
        const chars = '0123456789ABCDEF';
        const fontSize = 14;
        let columns = Math.floor(w / fontSize);
        let drops = Array(columns).fill(1);
        
        function draw(){
            x.fillStyle = 'rgba(0, 0, 0, 0.04)';
            x.fillRect(0, 0, w, h);
            
            for(let i = 0; i < drops.length; i++){
                const text = chars[Math.floor(Math.random() * chars.length)];
                const isGreen = Math.random() > 0.7;
                x.fillStyle = isGreen ? '#0F0' : '#a855f7';
                x.shadowBlur = isGreen ? 8 : 12;
                x.shadowColor = isGreen ? '#0F0' : '#a855f7';
                x.font = 'bold ' + fontSize + 'px monospace';
                x.fillText(text, i * fontSize, drops[i] * fontSize);
                x.shadowBlur = 0;
                
                if(drops[i] * fontSize > h && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        
        setInterval(draw, 40);
        
        window.addEventListener('resize', () => {
            resize();
            columns = Math.floor(w / fontSize);
            drops = Array(columns).fill(1);
        });
        
        const container = document.getElementById('container');
        const dots = document.querySelectorAll('.dot');
        const screens = document.querySelectorAll('.screen');
        function updateDots(){ const idx = Math.round(container.scrollTop / window.innerHeight); dots.forEach((d,i)=>d.classList.toggle('active', i===idx)); }
        function goTo(index){ screens[index].scrollIntoView({ behavior: 'smooth' }); }
        container.addEventListener('scroll', updateDots);
    </script>
</body>
</html>
